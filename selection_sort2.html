<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Selection Sort 視覺化進階版</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body {
    font-family: 'Poppins', sans-serif;
    text-align: center;
    background: linear-gradient(135deg,#141e30,#243b55);
    color: white;
}

h1 { margin-top: 20px; }

.container {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    height: 320px;
    margin-top: 30px;
}

.bar {
    width: 25px;
    margin: 0 3px;
    background: #00c6ff;
    border-radius: 5px;
    transition: all 0.3s ease;
}

.controls { margin-top: 20px; }

button, input {
    padding: 10px 15px;
    margin: 5px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
}

button {
    background: #00c6ff;
    color: black;
    cursor: pointer;
    font-weight: bold;
}

button:hover { background: #00a2cc; }

input[type=range] { width: 150px; }

.info { margin-top: 15px; font-size: 16px; }

.finished { background: #00ff9d !important; }
.active { background: #ff4d4d !important; }
.min { background: #ffd166 !important; }
</style>
</head>
<body>

<h1>⚡ Selection Sort 視覺化進階版</h1>

<div class="container" id="container"></div>

<div class="controls">
    <button onclick="generateArray()">🔄 重新產生</button>
    <button onclick="selectionSort()">▶️ 開始排序</button>
    <br>
    速度：<input type="range" min="50" max="1000" value="300" id="speed">
</div>

<div class="info" id="info">狀態：等待開始</div>

<script>
let array = [];
let isSorting = false;

function generateArray() {
    if (isSorting) return;

    const container = document.getElementById('container');
    container.innerHTML = '';
    array = [];

    for (let i = 0; i < 20; i++) {
        let value = Math.floor(Math.random() * 250) + 20;
        array.push(value);

        let bar = document.createElement('div');
        bar.classList.add('bar');
        bar.style.height = value + 'px';
        container.appendChild(bar);
    }

    document.getElementById('info').innerText = '狀態：已生成新陣列';
}

function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function selectionSort() {
    if (isSorting) return;
    isSorting = true;

    let bars = document.getElementsByClassName('bar');
    let speed = document.getElementById('speed');

    for (let i = 0; i < array.length; i++) {
        let minIndex = i;
        bars[minIndex].classList.add('min');

        for (let j = i + 1; j < array.length; j++) {
            document.getElementById('info').innerText = `比較 index ${minIndex} 和 ${j}`;

            bars[j].classList.add('active');
            await sleep(speed.value);

            if (array[j] < array[minIndex]) {
                bars[minIndex].classList.remove('min');
                minIndex = j;
                bars[minIndex].classList.add('min');
            }

            bars[j].classList.remove('active');
        }

        if (minIndex !== i) {
            document.getElementById('info').innerText = `交換 ${array[i]} 和 ${array[minIndex]}`;
            await sleep(speed.value);

            let temp = array[i];
            array[i] = array[minIndex];
            array[minIndex] = temp;

            bars[i].style.height = array[i] + 'px';
            bars[minIndex].style.height = array[minIndex] + 'px';
        }

        bars[minIndex].classList.remove('min');
        bars[i].classList.add('finished');
    }

    document.getElementById('info').innerText = '排序完成！';
    isSorting = false;
}

// 初始化
generateArray();
</script>

</body>
</html>
