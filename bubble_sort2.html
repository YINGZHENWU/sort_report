<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>氣泡排序演示</title>

<style>
body{
    font-family: Arial;
    text-align: center;
    background:#f5f5f5;
}

h2{
    margin-top:20px;
}

#container{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    height:300px;
    margin:30px;
}

.bar{
    width:30px;
    margin:3px;
    background:#4CAF50;
    color:white;
    font-size:12px;
}

button{
    padding:10px 20px;
    margin:10px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<h2>氣泡排序演示 (Bubble Sort Visualization)</h2>

<div id="container"></div>

<button onclick="generateArray()">生成隨機數列</button>
<button onclick="bubbleSort()">開始排序</button>

<script>

let array = [];

function generateArray(){
    const container = document.getElementById("container");
    container.innerHTML = "";
    array = [];

    for(let i=0;i<15;i++){
        let value = Math.floor(Math.random()*100)+10;
        array.push(value);

        let bar = document.createElement("div");
        bar.classList.add("bar");
        bar.style.height = value*2 + "px";
        bar.innerText = value;

        container.appendChild(bar);
    }
}

function sleep(ms){
    return new Promise(resolve => setTimeout(resolve,ms));
}

async function bubbleSort(){

    let bars = document.getElementsByClassName("bar");

    for(let i=0;i<array.length;i++){

        for(let j=0;j<array.length-i-1;j++){

            bars[j].style.background="red";
            bars[j+1].style.background="red";

            await sleep(300);

            if(array[j] > array[j+1]){

                let temp = array[j];
                array[j] = array[j+1];
                array[j+1] = temp;

                bars[j].style.height = array[j]*2 + "px";
                bars[j+1].style.height = array[j+1]*2 + "px";

                bars[j].innerText = array[j];
                bars[j+1].innerText = array[j+1];
            }

            bars[j].style.background="#4CAF50";
            bars[j+1].style.background="#4CAF50";
        }

        bars[array.length-i-1].style.background="orange";
    }
}

generateArray();

</script>

</body>
</html>
